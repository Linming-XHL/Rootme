name: Build preload.so

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: 29.0.14206865
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lld cpio python3

      - name: Generate target.h from symbols.txt
        run: |
          python3 generate_target.py > CyberMeowfia/IonStack/CVE-2026-43499/exploit/src/targets/blazer-CP2A.260605.012/target.h
          echo "Generated target.h from symbols.txt"

      - name: Build default target
        run: |
          cd CyberMeowfia/IonStack/CVE-2026-43499/exploit
          make PROJECT=blazer-CP2A.260605.012

      - name: Upload preload.so
        uses: actions/upload-artifact@v4
        with:
          name: preload-so
          path: CyberMeowfia/IonStack/CVE-2026-43499/exploit/build/*/bin/preload.so

      - name: Build all targets
        if: github.event_name == 'workflow_dispatch'
        run: |
          cd CyberMeowfia/IonStack/CVE-2026-43499/exploit
          make list-projects | while read -r project; do
            echo "Building $project"
            make PROJECT="$project" || echo "Failed to build $project"
          done

      - name: Upload all builds
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: preload-so-all-targets
          path: CyberMeowfia/IonStack/CVE-2026-43499/exploit/build/*/bin/preload.so
